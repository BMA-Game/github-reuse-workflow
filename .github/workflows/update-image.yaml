name: Update image

on:
  workflow_call:
    inputs:
      path:
        required: false
        type: string
      paths:
        required: false
        type: string
      tag:
        required: true
        type: string
      env:
        required: true
        type: string
      branch:
        required: true
        type: string
    secrets:
      GH_PAT:
        required: true

concurrency:
  group: update-image-${{ github.repository }}-${{ inputs.branch }}
  cancel-in-progress: false

jobs:
  change-image-tag-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          ref: ${{ inputs.branch }}

      - name: Sync branch
        run: git pull --rebase origin "${{ inputs.branch }}"

      - name: Set Image in Terragrunt
        env:
          PATHS: ${{ inputs.paths || inputs.path }}
        run: |
          IFS=','
          for path in $PATHS; do
            trim_path=$(echo $path | tr -d ' ')
            sed -i -E 's|tag(\s*)\=\s\"(.*)"|tag\1= "${{ inputs.tag }}"|g' ./$trim_path
          done

      - name: Commit and push (with rebase retry)
        env:
          BRANCH: ${{ inputs.branch }}
          COMMIT_MSG: "ci: 🎡 update image terragrunt ${{ inputs.env }} with ${{ inputs.tag }}"
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3; do
            git pull --rebase origin "${BRANCH}"
            git add -A
            if git diff --staged --quiet; then
              echo "No terragrunt changes to commit"
              exit 0
            fi
            git commit -m "${COMMIT_MSG}"
            if git push origin "HEAD:${BRANCH}"; then
              echo "Push succeeded on attempt ${attempt}"
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}), resetting for retry..."
            git reset --soft HEAD~1
            sleep 5
          done
          echo "Failed to push after 3 attempts"
          exit 1
