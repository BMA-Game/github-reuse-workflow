name: Deploy to K8s

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      docker-image: 
        required: true
        type: string
      docker-tag: 
        required: true
        type: string
      matrix-path:
        required: true
        type: string
      tf-version:
        required: true
        type: string
      tg-version:
        required: true
        type: string
      aws-region:
        required: true
        type: string
        default: ap-southeast-1
      role-to-assume:
        required: true
        type: string
      role-session-name:
        required: true
        type: string
      role-duration-seconds: 
        required: true
        type: number
        default: 1200
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      GH_ACTIONS_PRIVATE_KEY:
        required: true
      GH_PAT:
        required: true

jobs:
  terragrunt-apply:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        path: ${{ fromJson(inputs.matrix-path) }}
    steps:
      - name: Add SSH key
        env:
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
        run: |
          mkdir -p /home/runner/.ssh
          ssh-agent -a $SSH_AUTH_SOCK > /dev/null
          ssh-add - <<< "${{ secrets.GH_ACTIONS_PRIVATE_KEY }}"
          ssh-keyscan github.com >> /home/runner/.ssh/known_hosts

      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: true
          token: ${{ secrets.GH_PAT }}
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ inputs.tf-version}}
          terraform_wrapper: false
      
      - name: Current Terraform version
        run: |
          terraform -v
          which terraform
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws-region }}
          role-to-assume: ${{ inputs.role-to-assume }}
          role-session-name: ${{ inputs.role-session-name }}
          role-duration-seconds: ${{ inputs.role-duration-seconds }}
      
      - name: Setup AWS CLI
        id: install-aws-cli
        uses: unfor19/install-aws-cli-action@master
        with:
          version: 2
      
      - name: Check current role
        run: |
          aws --version
          aws sts get-caller-identity
        shell: bash
      
      - name: Install Terragrunt
        run: |
          sudo wget -q -O /bin/terragrunt "https://github.com/gruntwork-io/terragrunt/releases/download/${{ inputs.tg-version }}/terragrunt_linux_amd64"
          sudo chmod +x /bin/terragrunt
          terragrunt -v
      
      - name: Terragrunt Init
        id: init
        env:
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
          WORKING_DIR: ${{ github.workspace }}/terragrunt/${{ inputs.environment }}/${{ matrix.path }}
        run: |
          terragrunt init -upgrade --terragrunt-working-dir ${{ env.WORKING_DIR }}
      
      - name: Terraform Apply
        id: apply
        env:
          DOCKER_IMAGE: ${{ inputs.docker-image }}
          DOCKER_TAG: ${{ inputs.docker-tag }}
          WORKING_DIR: ${{ github.workspace }}/terragrunt/${{ inputs.environment }}/${{ matrix.path }}
        run: |
          terragrunt apply --terragrunt-working-dir ${{ env.WORKING_DIR }} -auto-approve
